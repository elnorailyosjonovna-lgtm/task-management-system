{% extends "tasks/base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-body">

                <h3 class="mb-4">Create Project</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-success">
                        Create Project
                    </button>

                    <a href="{% url 'home' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
