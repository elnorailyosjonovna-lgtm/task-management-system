
events {}

http {
    upstream django {
        server web:8000;
    }

    # 1) HTTP -> HTTPS
    server {
        listen 80;
        server_name 142.93.173.177.nip.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2) HTTPS
    server {
        listen 443 ssl;
        server_name 142.93.173.177.nip.io;

        ssl_certificate     /etc/letsencrypt/live/142.93.173.177.nip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/142.93.173.177.nip.io/privkey.pem;

        location /static/ {
            alias /app/staticfiles/;
        }

        location /media/ {
            alias /app/media/;
        }

        location / {
            proxy_pass http://django;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Must for CSRF + secure cookies behind proxy:
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Ssl on;
            proxy_set_header X-Forwarded-Port 443;
            
            proxy_redirect off;
        }
    }
}

